openapi: "3.0.3"
info:
  title: Quanttide Business Models
  version: "0.1.0"
  description: 示例业务数据模型 — 用于验证 OpenAPI → Dart/TS 双向代码生成

paths: {}

components:
  schemas:
    # ---------- 值对象 ----------
    Address:
      type: object
      required: [province, city, detail]
      properties:
        province:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 20
        district:
          type: string
          maxLength: 20
        detail:
          type: string
          maxLength: 200
        postalCode:
          type: string
          pattern: '^\d{6}$'

    # ---------- 枚举 ----------
    OrderStatus:
      type: string
      enum:
        - pending
        - confirmed
        - shipped
        - delivered
        - cancelled

    ProductCategory:
      type: string
      enum:
        - electronics
        - clothing
        - food
        - books
        - other

    # ---------- 实体 ----------
    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+?1?\d{11}$'
        address:
          $ref: '#/components/schemas/Address'
        createdAt:
          type: string
          format: date-time

    Product:
      type: object
      required: [id, name, price, category]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        price:
          type: number
          minimum: 0
          exclusiveMinimum: true
        category:
          $ref: '#/components/schemas/ProductCategory'
        tags:
          type: array
          items:
            type: string
            maxLength: 20
          uniqueItems: true
        stock:
          type: integer
          minimum: 0
        published:
          type: boolean
        createdAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      required: [productId, quantity, price]
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0

    Order:
      type: object
      required: [id, userId, items, total, status]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          minItems: 1
        total:
          type: number
          minimum: 0
        status:
          $ref: '#/components/schemas/OrderStatus'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ---------- 仓储接口（CRUD 请求/响应）----------
    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+?1?\d{11}$'
        address:
          $ref: '#/components/schemas/Address'

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+?1?\d{11}$'
        address:
          $ref: '#/components/schemas/Address'

    PageRequest:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20

    PageResponse:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
